<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperishow - Review Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>APERISHOW</h1>
            <p>Review Dashboard - H-Farm College</p>
            <input type="password" id="password-input" placeholder="Password" autofocus>
            <button id="login-btn">Accedi</button>
            <p id="login-error" class="error hidden">Password errata</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>
            <h1>APERISHOW</h1>
            <div class="header-controls">
                <div class="search-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input type="text" id="search-input" placeholder="Cerca per nome...">
                </div>
                <button id="refresh-btn" title="Aggiorna dati">&#x1f504; Refresh</button>
            </div>
        </header>

        <main>
            <section id="pending-section">
                <div class="section-header" data-toggle="pending">
                    <h2>DA APPROVARE (<span id="pending-count">0</span>)</h2>
                    <span class="collapse-icon">&#9660;</span>
                </div>
                <div id="pending-grid" class="card-grid"></div>
            </section>

            <section id="approved-section">
                <div class="section-header" data-toggle="approved">
                    <h2>APPROVATI (<span id="approved-count">0</span>)</h2>
                    <span class="collapse-icon">&#9660;</span>
                </div>
                <div id="approved-list" class="approved-list"></div>
            </section>
        </main>

        <!-- Modal dettaglio card -->
        <div id="modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <div class="modal-body">
                    <div class="modal-img-wrapper">
                        <img id="modal-img" src="" alt="Face swap image">
                        <div id="toggle-before-after" class="toggle-switch">
                            <span class="toggle-label toggle-label-left">Selfie</span>
                            <div class="toggle-track">
                                <div class="toggle-thumb"></div>
                            </div>
                            <span class="toggle-label toggle-label-right active">AI</span>
                        </div>
                    </div>
                    <div class="modal-info">
                        <h3 id="modal-name"></h3>
                        <p class="modal-email" id="modal-email"></p>
                        <blockquote id="modal-dream"></blockquote>
                        <div id="modal-feedback-history" class="feedback-history hidden"></div>
                        <div class="modal-actions">
                            <textarea id="modal-feedback" placeholder="Feedback..." rows="3"></textarea>
                            <div class="modal-buttons">
                                <button id="btn-approve" class="btn-approve">Approva</button>
                                <button id="btn-reject" class="btn-reject">Rifiuta e rigenera</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="modal-loading" class="modal-loading hidden">
                    <div class="spinner"></div>
                    <p>Elaborazione in corso...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
